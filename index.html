<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mrs. Shah 🎂</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ffe0ec, #e0c3fc);
  text-align: center;
  overflow-x: hidden;
}

/* MAIN CARD */
.container {
  margin: 30px;
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.25);
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}

h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 3em;
  color: #b76e79;
}

.image-box img {
  width: 280px;
  border-radius: 20px;
  margin-top: 15px;
  box-shadow: 0 0 25px rgba(255,105,180,0.5);
}

/* BUTTON */
.btn {
  margin-top: 30px;
  padding: 14px 30px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff7eb3, #ff4f9a);
  color: white;
  font-size: 16px;
  cursor: pointer;
}

/* POPUP GLASS */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.5);
}

.popup-content {
  padding: 25px;
  width: 85%;
  max-width: 400px;
  border-radius: 20px;

  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);

  box-shadow: 0 0 40px rgba(255,105,180,0.4);
  animation: scaleUp 0.5s ease;
}

@keyframes scaleUp {
  from { transform: scale(0.6); opacity:0; }
  to { transform: scale(1); opacity:1; }
}

/* MESSAGE */
#typedMessage {
  margin-top: 15px;
  font-size: 1.1em;
  line-height: 1.6;
  min-height: 140px;
  color: #fff;
}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  background: red;
  top: -10px;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}

/* FLOATING ELEMENTS */
.heart, .balloon {
  position: fixed;
  bottom: -50px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
  <h1>Happy Birthday Mrs. Shah 💖</h1>

  <div class="image-box">
    <img src="IMG_3686.jpeg">
  </div>

  <button class="btn" onclick="startSurprise()">🎁 Click for Surprise</button>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <h2 style="color:white;">🎉 A Special Message 💖</h2>
    <div id="typedMessage"></div>
  </div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
const message = `Wishing a very Happy Birthday to Mrs. Shah! 🎉

Aunty, TINA pase thi tamara vishe itlu badhu sambhalyu chhe ke tamne mali ne toh nathi pan jaine em lage chhe ke tame khub j "Saras" vyakti chho 💖

Saachu kahu toh, e jevi chhe e badhu tamara j "Sanskar" nu parinam chhe! 🌸

I hope you have a fantastic day filled with happiness and health ✨
Best wishes 💐`;

function startSurprise() {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("music").play();
  typeMessage();
  launchConfetti();
}

/* typing */
let i = 0;
function typeMessage() {
  if (i < message.length) {
    document.getElementById("typedMessage").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeMessage, 30);
  }
}

/* confetti */
function launchConfetti() {
  for (let i = 0; i < 120; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (Math.random()*2 + 2) + "s";
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

/* hearts + balloons */
setInterval(() => {
  const el = document.createElement("div");
  const isHeart = Math.random() > 0.5;

  el.className = isHeart ? "heart" : "balloon";
  el.innerText = isHeart ? "💖" : "🎈";

  el.style.left = Math.random() * 100 + "vw";
  el.style.fontSize = (Math.random() * 20 + 15) + "px";

  document.body.appendChild(el);

  setTimeout(() => el.remove(), 6000);
}, 300);
</script>

</body>
</html>
